services:
  qvidian-shim:
    build: ./qvidian-shim
    container_name: qvidian-shim
    env_file:
      - ./qvidian-shim/.env
    environment:
      - PORT=${QVIDIAN_SHIM_PORT:-3010}
    ports:
      - "${QVIDIAN_SHIM_PORT:-3010}:${QVIDIAN_SHIM_PORT:-3010}"
    networks: [appnet]
    command: ["node", "/app/src/index.js"]
      
  qvidian-mcp:
    build: ./qvidian-mcp
    container_name: qvidian-mcp
    depends_on:
      - qvidian-shim
    environment:
      - PORT=${QVIDIAN_MCP_PORT:-3020}
      - QVIDIAN_SHIM_BASE=http://qvidian-shim:${QVIDIAN_SHIM_PORT:-3010}
      - QVIDIAN_BASE_URL=${QVIDIAN_BASE_URL}     # <—
      - QVIDIAN_API_KEY=${QVIDIAN_API_KEY}
    ports:
      - "${QVIDIAN_MCP_PORT:-3020}:${QVIDIAN_MCP_PORT:-3020}"
    networks: [appnet]
    command: ["node", "/app/src/server.js"] 

networks:
  appnet:
    driver: bridge
